<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emparejar Teléfono — Remote Linux Player</title>
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <style>
        :root {
            --bg-base: #0b1220;
            --bg-raised: #111827;
            --bg-elevated: #1f2937;
            --border: #28364d;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #22c55e;
            --glow: rgba(59, 130, 246, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
            position: relative;
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, var(--glow) 0%, rgba(11,18,32,0) 70%);
            z-index: 1;
            pointer-events: none;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 2;
            background-color: var(--bg-raised);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .icon-container {
            margin-bottom: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background-color: rgba(59, 130, 246, 0.1);
            border-radius: 50%;
            color: var(--accent);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
        }

        p.instructions {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .qr-box {
            background-color: white;
            border-radius: 16px;
            padding: 24px;
            display: inline-block;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            position: relative;
        }

        .qr-box img {
            display: block;
            max-width: 220px;
            height: auto;
        }

        .link-card {
            background-color: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            text-align: left;
            margin-bottom: 30px;
        }

        .link-card h2 {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .link-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .link-text {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 0.85rem;
            color: var(--text-primary);
            word-break: break-all;
            user-select: all;
        }

        .btn-copy {
            background-color: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-copy:hover {
            background-color: rgba(255,255,255,0.1);
            color: var(--text-primary);
        }

        .btn-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 12px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-bottom: 12px;
        }

        .btn-action:hover {
            background-color: var(--bg-elevated);
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }

        .btn-back {
            display: inline-block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-decoration: none;
        }

        .btn-back:hover {
            color: var(--text-primary);
            text-decoration: underline;
        }

        .error-message {
            color: #f87171;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <div class="icon-container">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M11 18.1827C11 17.6305 11.4477 17.1827 12 17.1827C12.5523 17.1827 13.0001 17.6305 13.0001 18.1827C13.0001 18.735 12.5524 19.1827 12.0001 19.1827C11.4478 19.1827 11 18.735 11 18.1827Z" fill="currentColor"/><path d="M10.5 3.93274C10.0858 3.93274 9.75 4.26853 9.75 4.68274C9.75 5.09695 10.0858 5.43274 10.5 5.43274H13.5C13.9142 5.43274 14.25 5.09695 14.25 4.68274C14.25 4.26853 13.9142 3.93274 13.5 3.93274H10.5Z" fill="currentColor"/><path fill-rule="evenodd" clip-rule="evenodd" d="M10.1676 0.932739H13.8324C14.715 0.932733 15.4231 0.932727 15.9957 0.979509C16.584 1.02758 17.095 1.12875 17.566 1.36871C18.3186 1.75221 18.9305 2.36413 19.314 3.11678C19.554 3.58774 19.6552 4.09875 19.7032 4.68707C19.75 5.25964 19.75 5.9677 19.75 6.8503V16.5151C19.75 17.3977 19.75 18.1058 19.7032 18.6784C19.6552 19.2667 19.554 19.7777 19.314 20.2487C18.9305 21.0014 18.3186 21.6133 17.566 21.9968C17.095 22.2367 16.584 22.3379 15.9957 22.386C15.4231 22.4328 14.715 22.4327 13.8324 22.4327H10.1676C9.28499 22.4327 8.57691 22.4328 8.00433 22.386C7.41601 22.3379 6.905 22.2367 6.43404 21.9968C5.68139 21.6133 5.06947 21.0014 4.68597 20.2487C4.44601 19.7777 4.34484 19.2667 4.29677 18.6784C4.24999 18.1058 4.24999 17.3977 4.25 16.5151V6.85037C4.24999 5.96774 4.24999 5.25966 4.29677 4.68707C4.34484 4.09875 4.44601 3.58774 4.68597 3.11678C5.06947 2.36413 5.68139 1.75221 6.43404 1.36871C6.905 1.12875 7.41601 1.02758 8.00433 0.979509C8.57692 0.932727 9.285 0.932733 10.1676 0.932739ZM8.12648 2.47453C7.63092 2.51502 7.33928 2.59096 7.11502 2.70522C6.64462 2.94491 6.26217 3.32736 6.02248 3.79776C5.90822 4.02202 5.83228 4.31366 5.79179 4.80922C5.75058 5.31354 5.75 5.96028 5.75 6.88274V16.4827C5.75 17.4052 5.75058 18.0519 5.79179 18.5563C5.83228 19.0518 5.90822 19.3435 6.02248 19.5677C6.26217 20.0381 6.64462 20.4206 7.11502 20.6603C7.33928 20.7745 7.63092 20.8505 8.12648 20.891C8.6308 20.9322 9.27754 20.9327 10.2 20.9327H13.8C14.7225 20.9327 15.3692 20.9322 15.8735 20.891C16.3691 20.8505 16.6607 20.7745 16.885 20.6603C17.3554 20.4206 17.7378 20.0381 17.9775 19.5677C18.0918 19.3435 18.1677 19.0518 18.2082 18.5563C18.2494 18.0519 18.25 17.4052 18.25 16.4827V6.88274C18.25 5.96028 18.2494 5.31354 18.2082 4.80922C18.1677 4.31366 18.0918 4.02202 17.9775 3.79776C17.7378 3.32736 17.3554 2.94491 16.885 2.70522C16.6607 2.59096 16.3691 2.51502 15.8735 2.47453C15.3692 2.43332 14.7225 2.43274 13.8 2.43274H10.2C9.27754 2.43274 8.6308 2.43332 8.12648 2.47453Z" fill="currentColor"/></svg>
        </div>
        
        <h1>Emparejar tu teléfono</h1>
        <p class="instructions">Escanea el código QR con la cámara de tu teléfono móvil o escribe la dirección de abajo para conectar el control remoto.</p>
        
        <div id="error-alert" class="error-message"></div>

        <div class="qr-box">
            <img id="qr-img" src="/api/pairing-qr" alt="Código QR de Emparejamiento">
        </div>
        
        <div class="link-card">
            <h2>Enlace de emparejamiento</h2>
            <div class="link-row">
                <span class="link-text" id="pairing-link">Cargando...</span>
                <button class="btn-copy" onclick="copyLink()" id="copy-btn">Copiar</button>
            </div>
        </div>
        
        <button class="btn-action" onclick="regenerateToken()">Generar nuevo código</button>
        <a href="/" class="btn-back">Ir al Panel de Control</a>
    </div>

    <script>
        let currentLink = '';

        async function loadToken() {
            const errAlert = document.getElementById('error-alert');
            try {
                const res = await fetch('/api/pairing-token');
                if (res.ok) {
                    const data = await res.json();
                    const token = data.token;
                    currentLink = `${window.location.origin}/?token=${token}`;
                    document.getElementById('pairing-link').textContent = currentLink;
                    document.getElementById('qr-img').src = `/api/pairing-qr?t=${Date.now()}`;
                    errAlert.style.display = 'none';
                } else {
                    if (res.status === 403) {
                        errAlert.textContent = "Error: Acceso permitido únicamente desde la pantalla local de la TV (localhost).";
                    } else {
                        errAlert.textContent = "Error al cargar el token del servidor.";
                    }
                    errAlert.style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                errAlert.textContent = "No se pudo conectar con el servidor local.";
                errAlert.style.display = 'block';
            }
        }

        async function regenerateToken() {
            if (!confirm("Esto desconectará los dispositivos emparejados anteriormente. ¿Continuar?")) {
                return;
            }
            const errAlert = document.getElementById('error-alert');
            try {
                const res = await fetch('/api/pairing-token/regenerate', { method: 'POST' });
                if (res.ok) {
                    await loadToken();
                } else {
                    errAlert.textContent = "Error al regenerar el token.";
                    errAlert.style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                errAlert.textContent = "Error al conectar con el servidor.";
                errAlert.style.display = 'block';
            }
        }

        function copyLink() {
            if (!currentLink) return;
            const btn = document.getElementById('copy-btn');
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(currentLink).then(() => {
                    btn.textContent = 'Copiado';
                    setTimeout(() => { btn.textContent = 'Copiar'; }, 2000);
                }).catch(() => {
                    alert('No se pudo copiar automáticamente.');
                });
            } else {
                alert('Copiar no está soportado en este navegador (requiere HTTPS o localhost).');
            }
        }

        window.onload = loadToken;
    </script>
</body>
</html>
