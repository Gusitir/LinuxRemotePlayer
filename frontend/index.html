<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Remote Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex flex-col h-screen select-none">

    <div class="p-4 flex justify-between items-center bg-gray-800 shadow-md">
        <h1 class="text-xl font-bold text-blue-400">Remote Kiosk</h1>
        <p id="status" class="text-red-500 text-sm font-bold">Disconnected</p>
    </div>

    <div class="flex-1 overflow-y-auto p-4" id="main-content">
        <h2 class="text-lg font-semibold mb-4 text-gray-400">Suggested Web Kiosks</h2>
        <div id="suggested-grid" class="grid grid-cols-3 gap-4 mb-8"></div>

        <h2 class="text-lg font-semibold mb-4 text-gray-400">Native Apps</h2>
        <div id="apps-grid" class="grid grid-cols-3 gap-4 mb-8"></div>
    </div>

    <div class="bg-gray-800 p-4 rounded-t-3xl shadow-[0_-4px_10px_rgba(0,0,0,0.5)]">
        <div class="flex justify-between items-center mb-4">
            <button onclick="killKiosk()" class="bg-red-700 px-4 py-2 rounded-lg text-sm font-bold">Close App</button>
            <button onmousedown="startVoice()" onmouseup="stopVoice()" onmouseleave="stopVoice()" ontouchstart="startVoice()" ontouchend="stopVoice()" class="bg-green-600 px-6 py-2 rounded-full active:bg-green-400 font-bold flex items-center gap-2 select-none">
                🎤 Voice
            </button>
        </div>

        <div class="flex justify-between items-center">
            <div class="grid grid-cols-3 gap-2">
                <div></div>
                <button onclick="sendKey('KEY_UP')" class="bg-gray-700 w-12 h-12 rounded-lg active:bg-gray-500 flex justify-center items-center font-bold">U</button>
                <div></div>
                <button onclick="sendKey('KEY_LEFT')" class="bg-gray-700 w-12 h-12 rounded-lg active:bg-gray-500 flex justify-center items-center font-bold">L</button>
                <button onclick="sendKey('KEY_ENTER')" class="bg-blue-600 w-12 h-12 rounded-lg active:bg-blue-400 font-bold flex justify-center items-center">OK</button>
                <button onclick="sendKey('KEY_RIGHT')" class="bg-gray-700 w-12 h-12 rounded-lg active:bg-gray-500 flex justify-center items-center font-bold">R</button>
                <div></div>
                <button onclick="sendKey('KEY_DOWN')" class="bg-gray-700 w-12 h-12 rounded-lg active:bg-gray-500 flex justify-center items-center font-bold">D</button>
                <div></div>
            </div>

            <div class="flex flex-col gap-2">
                <button onclick="sendKey('KEY_ESC')" class="bg-red-600 w-16 h-16 rounded-full active:bg-red-400 font-bold">Back</button>
                <div class="flex gap-2">
                    <button onclick="sendMedia('KEY_VOLUMEDOWN')" class="bg-gray-700 w-12 h-10 rounded-lg active:bg-gray-500 font-bold">V-</button>
                    <button onclick="sendMedia('KEY_MUTE')" class="bg-gray-700 w-12 h-10 rounded-lg active:bg-gray-500 font-bold">M</button>
                    <button onclick="sendMedia('KEY_VOLUMEUP')" class="bg-gray-700 w-12 h-10 rounded-lg active:bg-gray-500 font-bold">V+</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
